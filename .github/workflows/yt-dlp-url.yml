name: YT-DLP-Url

on:
  workflow_dispatch: # 手動実行用

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # これが重要です！
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test yt-dlp-version
        run: |
          # Node.jsの正確なパスを特定
          NODE_PATH=$(which node)
          echo "DEBUG: Node.js is located at: $NODE_PATH"
          
          # バージョンも確認して環境を確実にする
          node --version
          YT_URL=$(cat url.txt)
          
          # 直接パスを指定して実行！
          python yt-dlp-master/yt_dlp/__main__.py "$YT_URL" -v --js-runtimes "node:$NODE_PATH"

      - name: Speak yt-dlp
        run: |
          echo "yt-dlp-master/yt_dlp/__main__.py を実行しました！🚀
          
      - name: Cleanup and Commit
        run: |
          echo " 1. Gitユーザー設定"
          git config --global user.name "Gemini-Bot"
          git config --global user.email "bot@example.com"
          
          echo "2. リモートの変更を強制的に取り込む（fetchとmerge）"
          git fetch origin
          echo "リモートの変更をローカルにマージ（競合しても強引に合わせる設定）"
          git merge origin/master --no-edit || git rebase origin/master
          
          echo "3. 追加とコミット"
          git add .
          git commit -m "yt-dlp-test cleaned ✨" || true
          
          echo " 4. 強制プッシュ（これで通るはず！）"
          git push -f origin master
