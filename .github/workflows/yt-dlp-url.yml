name: YT-DLP-Url

on:
  workflow_dispatch: # 手動実行用

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # これが重要です！
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: python -m pip install requests curl_cffi
        run: |
          python -m pip install requests curl_cffi
      - name: grep
        run: |
          echo "grep 'No title found in player responses'"
          grep "No title found in player responses" || true

      - name: Generate Cookies via Headless Browser
        run: deno run -A fetch_cookies.ts || true

      - name: Fetch and Rename Meta
        run: |
          # export http_proxy="http://dave-sixth-knives-gas.trycloudflare.com"
          # export https_proxy="https://dave-sixth-knives-gas.trycloudflare.com"
          
          YT_URL=$(cat url.txt)
          python setumei.py
          echo "直接プロキシ引数を外して、環境変数経由で叩く"
          python yt-dlp-master/yt_dlp/__main__.py -v -j --cookies cookies.txt "$YT_URL" > temp.txt || true
          
          TITLE=$(jq -r '.title' temp.json | sed 's/[^a-zA-Z0-9]/_/g') || true
          ID=$(jq -r '.id' temp.json) || true
          FINAL_NAME="${TITLE}-${ID}.json"
          mv temp.json "$FINAL_NAME" || true
          echo "ファイルを作成しました: $FINAL_NAME"
      
      - name: Speak yt-dlp
        run: |
          echo "yt-dlp-master/yt_dlp/__main__.py を実行しました！🚀"
          grep -oE "[a-zA-Z_]+\.pyの関数[a-zA-Z_]+を実行しました" temp.json | sort | uniq -c | sort -nr > log.txt || true
          echo "ログファイル名（例: yt_log.txt）から、エラーが出た行の前後10行を抽出"
          grep -B 10 "format_traceback" temp.txt | tail -n 20 || true
          
      - name: Cleanup and Commit
        run: |
          echo " 1. Gitユーザー設定"
          git config --global user.name "Gemini-Bot"
          git config --global user.email "bot@example.com"
          
          echo "2. リモートの変更を強制的に取り込む（fetchとmerge）"
          git fetch origin
          echo "リモートの変更をローカルにマージ（競合しても強引に合わせる設定）"
          git merge origin/master --no-edit || git rebase origin/master
          
          echo "3. 追加とコミット"
          git add .
          git commit -m "yt-dlp-test cleaned ✨" || true
          
          echo " 4. 強制プッシュ（これで通るはず！）"
          git push -f origin master
